<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Wrapped data analyzer logo">
  <defs>
    <linearGradient id="brand" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="24" fill="#0f0a1e"/>
  <!-- three ascending bars: a data/analytics "wrapped" motif, no third-party marks -->
  <rect x="26" y="58" width="12" height="20" rx="3" fill="url(#brand)"/>
  <rect x="44" y="44" width="12" height="34" rx="3" fill="url(#brand)"/>
  <rect x="62" y="30" width="12" height="48" rx="3" fill="url(#brand)"/>
  <!-- play spark accent -->
  <circle cx="68" cy="24" r="6" fill="#f59e0b"/>
</svg>
