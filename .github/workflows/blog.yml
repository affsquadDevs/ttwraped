name: Daily Blog

# Generates brand-new blog posts with the Claude API (matching the existing
# posts' style + on-page SEO) and writes them into this repo's TypeScript blog
# system: a directory under lib/blog/posts/<slug>/ with one <locale>.ts file per
# locale plus index.ts, and a registration in lib/blog/registry.ts. Then commits
# to main. That push triggers the Vercel production deploy and the IndexNow ping.
#
# The cron fires daily, but scripts/should-run-blog.mjs gates it down to 2 random
# days per ISO week, so posts are generated only ~twice a week. A manual
# "Run workflow" always generates, regardless of the day.

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC — gated to 2 random days/week below
  workflow_dispatch:
    inputs:
      count:
        description: "How many new posts to generate"
        type: string
        default: "2"

concurrency:
  group: daily-blog
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # On scheduled runs, only proceed on this week's 2 random days. Manual runs
      # skip the gate (always generate).
      - name: Weekly run gate
        id: gate
        run: echo "run=$(node scripts/should-run-blog.mjs)" >> "$GITHUB_OUTPUT"

      - name: Generate posts
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-opus-4-8
        run: node scripts/generate-blog.mjs --count "${{ inputs.count || '2' }}"

      - name: Commit & push
        id: commit
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage only the blog files this run can touch.
          git add lib/blog/posts/ lib/blog/registry.ts
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "blog: add daily posts ($DATE)"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # A push made with GITHUB_TOKEN does NOT trigger indexnow.yml (on: push),
      # so submit the new URLs here instead. Vercel deploys this push on its own;
      # wait for it to go live, then ping IndexNow with every sitemap URL.
      # (scripts/indexnow.mjs with no args submits all URLs from the live sitemap.)
      - name: Ping IndexNow
        if: steps.commit.outputs.pushed == 'true'
        run: |
          sleep 120
          node scripts/indexnow.mjs
